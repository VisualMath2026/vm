<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <title>VM Graphics Demo</title>
    <style>
      body {
        margin: 0;
        padding: 24px;
        font-family: Inter, Arial, sans-serif;
        background: #f5f7fb;
        color: #111827;
      }

      .app {
        max-width: 1400px;
        margin: 0 auto;
      }

      h1 {
        margin: 0 0 18px 0;
        font-size: 44px;
        line-height: 1.05;
      }

      .panel {
        background: #ffffff;
        border: 1px solid #e5e7eb;
        border-radius: 16px;
        padding: 16px;
        box-shadow: 0 6px 24px rgba(17, 24, 39, 0.06);
        margin-bottom: 16px;
      }

      .controls {
        display: grid;
        grid-template-columns: auto minmax(260px, 1fr);
        gap: 10px 12px;
        align-items: center;
        margin-bottom: 14px;
      }

      .controls label {
        font-weight: 600;
      }

      input {
        width: 100%;
        max-width: 100%;
        padding: 12px 14px;
        font-size: 18px;
        border: 1px solid #d1d5db;
        border-radius: 12px;
        outline: none;
        box-sizing: border-box;
      }

      input:focus {
        border-color: #2563eb;
      }

      .actions {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        margin-bottom: 10px;
      }

      button {
        padding: 12px 16px;
        font-size: 16px;
        border: 0;
        border-radius: 12px;
        background: #111827;
        color: white;
        cursor: pointer;
      }

      button.secondary {
        background: #e5e7eb;
        color: #111827;
      }

      .legend {
        display: flex;
        gap: 16px;
        flex-wrap: wrap;
        margin-top: 6px;
        font-size: 14px;
        color: #4b5563;
      }

      .legend-item {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .legend-swatch {
        width: 12px;
        height: 12px;
        border-radius: 999px;
        display: inline-block;
      }

      .examples {
        margin-top: 10px;
        font-size: 14px;
        color: #4b5563;
      }

      code {
        background: #eef2ff;
        padding: 2px 6px;
        border-radius: 6px;
      }

      .workspace {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 360px;
        gap: 16px;
        align-items: start;
      }

      .graph-card, .info-card {
        background: #ffffff;
        border: 1px solid #e5e7eb;
        border-radius: 16px;
        box-shadow: 0 6px 24px rgba(17, 24, 39, 0.06);
      }

      .graph-card {
        overflow: hidden;
      }

      canvas {
        display: block;
        width: 100%;
        height: 720px;
        background: white;
      }

      .info-card {
        padding: 18px;
      }

      .info-card h2 {
        margin: 0 0 14px 0;
        font-size: 22px;
      }

      .tabs {
        display: flex;
        gap: 8px;
        margin-bottom: 16px;
        flex-wrap: wrap;
      }

      .tab-btn {
        padding: 8px 12px;
        border-radius: 10px;
        border: 1px solid #d1d5db;
        background: #f8fafc;
        color: #111827;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
      }

      .tab-btn.active {
        background: #111827;
        color: #ffffff;
        border-color: #111827;
      }

      .tab-btn.empty {
        opacity: 0.6;
      }

      .metric {
        margin-bottom: 14px;
      }

      .metric-label {
        font-size: 13px;
        color: #6b7280;
        margin-bottom: 4px;
      }

      .metric-value {
        font-size: 15px;
        color: #111827;
        line-height: 1.45;
        word-break: break-word;
      }

      @media (max-width: 1100px) {
        .workspace {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <h1>VM Graphics Demo</h1>

      <div class="panel">
        <div class="controls">
          <label for="expr1">f1(x) =</label>
          <input id="expr1" value="x^2" />

          <label for="expr2">f2(x) =</label>
          <input id="expr2" value="sin(x)" />

          <label for="expr3">f3(x) =</label>
          <input id="expr3" value="abs(x) - 4" />
        </div>

        <div class="actions">
          <button id="plot">Построить</button>
          <button id="fit" class="secondary">Auto Fit</button>
          <button id="reset" class="secondary">Сбросить вид</button>
        </div>

        <div class="legend">
          <div class="legend-item">
            <span class="legend-swatch" style="background:#2563eb;"></span>
            <span>f1</span>
          </div>
          <div class="legend-item">
            <span class="legend-swatch" style="background:#dc2626;"></span>
            <span>f2</span>
          </div>
          <div class="legend-item">
            <span class="legend-swatch" style="background:#16a34a;"></span>
            <span>f3</span>
          </div>
        </div>

        <div class="examples">
          Примеры:
          <code>sin(x)</code>,
          <code>x^2</code>,
          <code>x^2/8 - 3</code>,
          <code>3/x</code>,
          <code>abs(x) - 4</code>,
          <code>cos(x) + x/3</code>
        </div>
      </div>

      <div class="workspace">
        <div class="graph-card">
          <canvas id="canvas" width="1000" height="720"></canvas>
        </div>

        <div class="info-card">
          <h2>Свойства функции</h2>

          <div class="tabs">
            <button class="tab-btn active" data-tab="0" id="tab0">f1</button>
            <button class="tab-btn" data-tab="1" id="tab1">f2</button>
            <button class="tab-btn" data-tab="2" id="tab2">f3</button>
          </div>

          <div class="metric">
            <div class="metric-label">Анализируемая функция</div>
            <div class="metric-value" id="infoExpr">x^2</div>
          </div>

          <div class="metric">
            <div class="metric-label">Режим анализа</div>
            <div class="metric-value" id="infoMode">—</div>
          </div>

          <div class="metric">
            <div class="metric-label">Область определения</div>
            <div class="metric-value" id="infoDomain">—</div>
          </div>

          <div class="metric">
            <div class="metric-label">Область значений</div>
            <div class="metric-value" id="infoRange">—</div>
          </div>

          <div class="metric">
            <div class="metric-label">Нули функции</div>
            <div class="metric-value" id="infoZeros">—</div>
          </div>

          <div class="metric">
            <div class="metric-label">Точки разрыва</div>
            <div class="metric-value" id="infoBreaks">—</div>
          </div>

          <div class="metric">
            <div class="metric-label">Критические точки</div>
            <div class="metric-value" id="infoCritical">—</div>
          </div>
        </div>
      </div>
    </div>

    <script type="module">
      import {
        Scene2D,
        Grid2D,
        Axis2D,
        Interaction2D,
        plotFunctionExpression,
        parseExpression,
        analyzeExprOnInterval
      } from "./dist/index.js";

      const canvas = document.getElementById("canvas");
      const context = canvas.getContext("2d");

      const exprInputs = [
        document.getElementById("expr1"),
        document.getElementById("expr2"),
        document.getElementById("expr3"),
      ];

      const plotButton = document.getElementById("plot");
      const fitButton = document.getElementById("fit");
      const resetButton = document.getElementById("reset");

      const tabButtons = [
        document.getElementById("tab0"),
        document.getElementById("tab1"),
        document.getElementById("tab2"),
      ];

      const infoExpr = document.getElementById("infoExpr");
      const infoMode = document.getElementById("infoMode");
      const infoDomain = document.getElementById("infoDomain");
      const infoRange = document.getElementById("infoRange");
      const infoZeros = document.getElementById("infoZeros");
      const infoBreaks = document.getElementById("infoBreaks");
      const infoCritical = document.getElementById("infoCritical");

      const GRAPH_COLORS = ["#2563eb", "#dc2626", "#16a34a"];
      const GRAPH_IDS = ["graph-1", "graph-2", "graph-3"];

      const scene = new Scene2D({
        background: "#ffffff",
        camera: { x: 0, y: 0, zoom: 30, minZoom: 0.05, maxZoom: 400 },
      });

      scene.add(
        new Grid2D({
          id: "grid",
          step: 1,
          extent: 100,
          strokeStyle: "#eceff4",
          lineWidth: 0.8,
        })
      );

      scene.add(
        new Axis2D({
          id: "axis",
          extent: 100,
          strokeStyle: "#111827",
          lineWidth: 2,
          tickStep: 1,
          showLabels: true,
        })
      );

      let expressions = exprInputs.map((input) => input.value.trim());
      let activeTabIndex = 0;
      let rafId = null;

      function getVisibleBounds() {
        const topLeft = scene.camera.screenToWorld({ x: 0, y: 0 }, canvas.width, canvas.height);
        const bottomRight = scene.camera.screenToWorld({ x: canvas.width, y: canvas.height }, canvas.width, canvas.height);

        return {
          minX: Math.min(topLeft.x, bottomRight.x),
          maxX: Math.max(topLeft.x, bottomRight.x),
          minY: Math.min(topLeft.y, bottomRight.y),
          maxY: Math.max(topLeft.y, bottomRight.y),
        };
      }

      function getActiveExpressions() {
        return expressions
          .map((expression, index) => ({ expression: expression.trim(), index }))
          .filter((item) => item.expression.length > 0);
      }

      function formatFallbackList(values, limit = 8, emptyText = "Не найдены") {
        if (!values || values.length === 0) return emptyText;
        return values.slice(0, limit).map((value) => Number(value).toFixed(4)).join(", ");
      }

      function refreshTabs() {
        tabButtons.forEach((button, index) => {
          button.classList.toggle("active", index === activeTabIndex);
          button.classList.toggle("empty", expressions[index].trim().length === 0);
        });
      }

      function computeMultiAutoFitBounds() {
        const active = getActiveExpressions();

        if (active.length === 0) {
          return {
            minX: -10,
            maxX: 10,
            minY: -10,
            maxY: 10,
          };
        }

        let minY = Infinity;
        let maxY = -Infinity;

        for (const item of active) {
          const expr = parseExpression(item.expression);
          const analysis = analyzeExprOnInterval(expr, -10, 10);

          if (analysis.range) {
            minY = Math.min(minY, analysis.range.minY);
            maxY = Math.max(maxY, analysis.range.maxY);
          }
        }

        if (!Number.isFinite(minY) || !Number.isFinite(maxY)) {
          minY = -10;
          maxY = 10;
        }

        if (Math.abs(maxY - minY) < 1e-9) {
          minY -= 1;
          maxY += 1;
        }

        const padY = Math.max((maxY - minY) * 0.2, 1);

        return {
          minX: -10,
          maxX: 10,
          minY: minY - padY,
          maxY: maxY + padY,
        };
      }

      function updateInfo(bounds) {
        const expression = expressions[activeTabIndex]?.trim() ?? "";

        if (!expression) {
          infoExpr.textContent = `f${activeTabIndex + 1}: нет функции`;
          infoMode.textContent = "—";
          infoDomain.textContent = "—";
          infoRange.textContent = "—";
          infoZeros.textContent = "—";
          infoBreaks.textContent = "—";
          infoCritical.textContent = "—";
          return;
        }

        infoExpr.textContent = expression;

        try {
          const expr = parseExpression(expression);
          const analysis = analyzeExprOnInterval(expr, bounds.minX, bounds.maxX);

          infoMode.textContent = analysis.modeText ?? "Неизвестно";
          infoDomain.textContent = analysis.domainText ?? "Не удалось определить";
          infoRange.textContent = analysis.rangeText ?? "Не удалось определить";
          infoZeros.textContent = analysis.zerosText ?? formatFallbackList(analysis.zeros);
          infoBreaks.textContent = analysis.discontinuitiesText ?? formatFallbackList(analysis.discontinuities, 8, "Не найдены");
          infoCritical.textContent = analysis.criticalText ?? "Не найдены";
        } catch (error) {
          infoMode.textContent = "Ошибка анализа";
          infoDomain.textContent = "Ошибка анализа";
          infoRange.textContent = "Ошибка анализа";
          infoZeros.textContent = "Ошибка анализа";
          infoBreaks.textContent = "Ошибка анализа";
          infoCritical.textContent = "Ошибка анализа";
        }
      }

      function rebuildGraphsForCurrentView() {
        scene.objects = scene.objects.filter((obj) => obj.id === "grid" || obj.id === "axis");

        const bounds = getVisibleBounds();
        const active = getActiveExpressions();

        for (const item of active) {
          scene.add(
            plotFunctionExpression({
              id: GRAPH_IDS[item.index],
              expression: item.expression,
              xMin: bounds.minX,
              xMax: bounds.maxX,
              samples: Math.max(1200, Math.floor(canvas.width * 1.5)),
              strokeStyle: GRAPH_COLORS[item.index],
              lineWidth: 2,
              breakOnDiscontinuity: true,
              discontinuityThreshold: 8,
            })
          );
        }

        updateInfo(bounds);
      }

      function render() {
        rebuildGraphsForCurrentView();
        scene.render(context);
      }

      function requestRender() {
        if (rafId !== null) return;
        rafId = requestAnimationFrame(() => {
          rafId = null;
          render();
        });
      }

      function syncExpressionsFromInputs() {
        expressions = exprInputs.map((input) => input.value.trim());
        refreshTabs();
      }

      function autoFit() {
        const bounds = computeMultiAutoFitBounds();
        scene.camera.fitToBounds(bounds, canvas.width, canvas.height, 70);
      }

      function plotAll() {
        try {
          syncExpressionsFromInputs();
          autoFit();
          render();
        } catch (error) {
          alert("Некорректное выражение");
          console.error(error);
        }
      }

      plotButton.addEventListener("click", plotAll);
      fitButton.addEventListener("click", plotAll);

      resetButton.addEventListener("click", () => {
        scene.camera.x = 0;
        scene.camera.y = 0;
        scene.camera.zoom = 30;
        render();
      });

      exprInputs.forEach((input) => {
        input.addEventListener("keydown", (event) => {
          if (event.key === "Enter") {
            plotAll();
          }
        });
      });

      tabButtons.forEach((button, index) => {
        button.addEventListener("click", () => {
          activeTabIndex = index;
          refreshTabs();
          render();
        });
      });

      const interaction = new Interaction2D(canvas, scene, {
        onChange: () => requestRender(),
      });
      interaction.attach();

      syncExpressionsFromInputs();
      refreshTabs();
      autoFit();
      render();
    </script>
  </body>
</html>
