<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>VM Graphics Demo</title>
    <style>
      body {
        margin: 0;
        padding: 24px;
        font-family: sans-serif;
        background: #f5f5f5;
      }
      canvas {
        border: 1px solid #ccc;
        background: white;
      }
      p {
        max-width: 900px;
      }
    </style>
  </head>
  <body>
    <h1>VM Graphics Demo</h1>
    <p>Pan: drag with mouse. Zoom: mouse wheel. Demo renders several function graphs, including a discontinuous one.</p>
    <canvas id="canvas" width="1200" height="720"></canvas>

    <script type="module">
      import { createDemo2D } from "./dist/index.js";

      const canvas = document.getElementById("canvas");
      createDemo2D(canvas);
    </script>
  </body>
</html>
